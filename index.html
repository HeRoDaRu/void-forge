<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Forge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <header>
            <h1><span class="accent">VOID</span> FORGE</h1>
            <div class="stats-bar">
                <div class="stat-item"><span class="label">Essence</span><strong id="essence">0</strong></div>
                <div class="stat-item"><span class="label">Total Damage</span><strong id="damage-done">0</strong></div>
                <div class="stat-item"><span class="label">DPS</span><strong id="dps">0.0</strong></div>
                <div class="stat-item"><span class="label">Loop</span><strong id="loop-count">0</strong></div>
                <div class="stat-item"><span class="label">Shards</span><strong id="shards">0</strong></div>
            </div>
        </header>

        <main class="game-area">
            <div class="boss-section">
                <div id="boss-name">The Event Horizon</div>
                <div class="boss-visual-wrapper">
                    <div id="boss-visual" class="boss-visual">🌑</div>
                    <div id="click-hint" class="boss-click-hint">Click para atacar</div>
                </div>
                <div class="hp-container">
                    <div class="boss-health-bar">
                        <div id="health-fill" class="health-fill"></div>
                    </div>
                    <div id="boss-hp-text" class="hp-text">100,000 / 100,000</div>
                </div>
            </div>

            <div class="actions-panel">
                <button id="dps-improves-btn" class="action-btn-primary">⚡ MEJORAR DPS</button>
                <button id="boss-trials-btn" class="boss-trials-btn-primary">⚔️ TRIALES</button>
                <button id="prestige-btn" class="prestige-btn-primary">⚡ PRESTIGIO</button>
            </div>

            <div class="upgrades-scroll">
                <div id="upgrades" class="upgrades-grid"></div>
            </div>
        </main>
    </div>

    <div id="dps-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚡ Mejoras Auto Ataque</h2>
                <div class="modal-essence">
                    <span class="label">Essence</span>
                    <strong id="modal-essence">0</strong>
                </div>
                <button id="close-modal-btn" class="close-btn">✕</button>
            </div>
            <div id="dps-improves-list" class="dps-list"></div>
        </div>
    </div>

    <div id="trial-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚔️ Void Trial</h2>
                <div class="modal-essence">
                    <span class="label">Shards</span>
                    <strong id="modal-shards">0</strong>
                </div>
                <button id="close-trial-modal-btn" class="close-btn">✕</button>
            </div>
            <div class="trial-content">
                <div class="trial-boss-preview">
                    <div id="trial-boss-icon" class="trial-boss-icon">💀</div>
                    <div id="trial-boss-name" class="trial-boss-name">???</div>
                    <div id="trial-boss-hp" class="trial-boss-hp">HP: ???</div>
                </div>
                <div class="trial-info">
                    <p id="trial-manual-damage" class="trial-stat">Tu daño manual: <strong>0</strong></p>
                    <p id="trial-result-hint" class="trial-hint"></p>
                </div>
                <button id="trial-enter-btn" class="trial-enter-btn">
                    ⚔️ ENTRAR AL TRIAL
                </button>
            </div>
        </div>
    </div>

    <div id="prestige-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚡ Prestigio</h2>
                <div class="modal-essence">
                    <span class="label">Shards</span>
                    <strong id="prestige-modal-shards">0</strong>
                </div>
                <button id="close-prestige-modal-btn" class="close-btn">✕</button>
            </div>
            <div id="prestige-nodes-list" class="prestige-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
<footer>
    <p class="footer-text">Desarrollado por hectorrf16. ¡Gracias por jugar!</p>
</footer>

</html>
