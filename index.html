<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Void Forge - Ultra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1><span class="accent">VOID</span> FORGE</h1>
            <div class="stats-bar">
                <div class="stat-item"><span class="label">Essence</span><strong id="essence">0</strong></div>
                <div class="stat-item"><span class="label">DPS</span><strong id="dps">0.0</strong></div>
            </div>
        </header>

        <main class="game-area">
            <div class="boss-section">
                <div id="boss-name">The Event Horizon</div>
                <div class="boss-visual-wrapper">
                    <div id="boss-visual" class="boss-visual">🌑</div>
                </div>
                <div class="hp-container">
                    <div class="boss-health-bar">
                        <div id="health-fill" class="health-fill"></div>
                    </div>
                    <div id="boss-hp-text" class="hp-text">100,000 / 100,000</div>
                </div>
            </div>

            <div class="actions-panel">
                <button id="dps-improves-btn" class="action-btn-primary">⚡ UPGRADE DPS</button>
                <div id="damage-done" class="total-damage">Total: 0</div>
            </div>

            <div class="upgrades-scroll">
                <div id="upgrades" class="upgrades-grid"></div>
            </div>
        </main>
    </div>

    <div id="dps-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚡ DPS Core Improvements</h2>
                <button id="close-modal-btn" class="close-btn">✕</button>
            </div>
            <div id="dps-improves-list" class="dps-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
