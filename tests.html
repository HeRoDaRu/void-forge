<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Void Forge — Tests</title>
    <style>
        body { font-family: monospace; background: #05050f; color: #d0d0ff; padding: 20px; }
        h1 { color: #00f0ff; }
        .suite { margin: 20px 0; }
        .suite-title { font-size: 1.1rem; color: #00f0ff; margin-bottom: 8px; }
        .test { padding: 6px 12px; margin: 4px 0; border-radius: 4px; font-size: 0.9rem; }
        .pass { background: rgba(0,255,136,0.1); color: #00ff88; }
        .fail { background: rgba(255,45,85,0.1); color: #ff2d55; }
        .summary { margin-top: 30px; font-size: 1.1rem; border-top: 1px solid #1a1a33; padding-top: 16px; }
    </style>
</head>
<body>
    <h1>⚗️ Void Forge — Tests</h1>
    <div id="results"></div>
    <div id="summary" class="summary"></div>

    <!-- Elementos mínimos del DOM que script.js necesita para no explotar -->
    <div id="boss-name" style="display:none"></div>
    <div id="boss-visual" style="display:none"></div>
    <div id="health-fill" style="display:none"></div>
    <div id="boss-hp-text" style="display:none"></div>
    <div id="essence" style="display:none"></div>
    <div id="damage-done" style="display:none"></div>
    <div id="dps" style="display:none"></div>
    <div id="loop-count" style="display:none"></div>
    <div id="shards" style="display:none"></div>
    <div id="upgrades" style="display:none"></div>
    <div id="dps-modal" style="display:none"></div>
    <div id="dps-improves-list" style="display:none"></div>
    <div id="prestige-nodes-list" style="display:none"></div>
    <button id="dps-improves-btn" style="display:none"></button>
    <button id="boss-trials-btn" style="display:none"></button>
    <button id="close-modal-btn" style="display:none"></button>
    <button id="close-trial-modal-btn" style="display:none"></button>
    <button id="close-prestige-modal-btn" style="display:none"></button>
    <button id="prestige-btn" style="display:none"></button>
    <button id="enter-prestige-btn" style="display:none"></button>
    <button id="trial-enter-btn" style="display:none"></button>
    <div class="boss-visual-wrapper" style="display:none"></div>
    <div id="click-hint" style="display:none"></div>
    <div id="trial-modal" style="display:none"></div>
    <div id="prestige-modal" style="display:none"></div>

    <!-- Carga script.js — init() no se ejecuta porque boss-visual existe pero
         la condición del gameLoop no arranca sin requestAnimationFrame real -->
    <script src="script.js"></script>

<script>
// ── Mini framework ──────────────────────────────────────
let passed = 0;
let failed = 0;
let currentSuite = '';

function describe(name, fn) {
    currentSuite = name;
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    suiteEl.innerHTML = `<div class="suite-title">📦 ${name}</div>`;
    suiteEl.id = `suite-${name}`;
    document.getElementById('results').appendChild(suiteEl);
    fn();
}

function it(name, fn) {
    const el = document.createElement('div');
    el.className = 'test';
    try {
        fn();
        el.classList.add('pass');
        el.textContent = `✅ ${name}`;
        passed++;
    } catch(e) {
        el.classList.add('fail');
        el.textContent = `❌ ${name} — ${e.message}`;
        failed++;
    }
    document.getElementById(`suite-${currentSuite}`).appendChild(el);
}

function expect(value) {
    return {
        toBe: (expected) => {
            if (value !== expected)
                throw new Error(`esperaba ${expected}, recibió ${value}`);
        },
        toEqual: (expected) => {
            if (JSON.stringify(value) !== JSON.stringify(expected))
                throw new Error(`esperaba ${JSON.stringify(expected)}, recibió ${JSON.stringify(value)}`);
        },
        toBeGreaterThan: (expected) => {
            if (value <= expected)
                throw new Error(`esperaba > ${expected}, recibió ${value}`);
        },
        toBeLessThanOrEqual: (expected) => {
            if (value > expected)
                throw new Error(`esperaba <= ${expected}, recibió ${value}`);
        },
        toBeFalsy: () => {
            if (value) throw new Error(`esperaba falsy, recibió ${value}`);
        },
        toBeTruthy: () => {
            if (!value) throw new Error(`esperaba truthy, recibió ${value}`);
        },
    };
}

// Reset completo antes de cada suite
function resetState() {
    gameState.essence = 0;
    gameState.shards = 0;
    gameState.damageDone = 0;
    gameState.bossIndex = 0;
    gameState.loopCount = 0;
    gameState.hintDismissed = false;
    gameState.upgradesOwned = Object.fromEntries(
        CONFIG.upgrades.map((u, i) => [u.id, i === 0 ? 1 : 0])
    );
    gameState.dpsLevels = Object.fromEntries(
        CONFIG.dpsImprovements.map(d => [d.id, 0])
    );
    prestigeState.prestigeCount = 0;
    prestigeState.unlockedNodes = Object.fromEntries(
        CONFIG.prestigeNodes.map(n => [n.id, 0])
    );
}

resetState(); // estado limpio antes de empezar

// ── TESTS ───────────────────────────────────────────────

describe('getCost', () => {
    it('devuelve el coste base en nivel 0', () => {
        expect(getCost(150, 1.38, 0)).toBe(150);
    });
    it('escala correctamente en nivel 1', () => {
        expect(getCost(150, 1.38, 1)).toBe(Math.floor(150 * 1.38));
    });
    it('siempre devuelve un entero', () => {
        const result = getCost(150, 1.38, 7);
        expect(result).toBe(Math.floor(result));
    });
});

describe('calculateManualDamage', () => {
    it('devuelve 0 sin upgrades', () => {
        gameState.upgradesOwned = { 1:0, 2:0, 3:0, 4:0 };
        expect(calculateManualDamage()).toBe(0);
    });
    it('calcula correctamente con un upgrade', () => {
        gameState.upgradesOwned = { 1:5, 2:0, 3:0, 4:0 };
        expect(calculateManualDamage()).toBe(60);
    });
    it('suma correctamente varios upgrades', () => {
        gameState.upgradesOwned = { 1:2, 2:1, 3:0, 4:0 };
        expect(calculateManualDamage()).toBe(69);
    });
});

describe('getBossHP', () => {
    it('en loop 0 devuelve el HP base', () => {
        gameState.loopCount = 0;
        expect(getBossHP(CONFIG.bosses[0], 0)).toBe(50000);
    });
    it('escala correctamente en loop 1', () => {
        gameState.loopCount = 1;
        expect(getBossHP(CONFIG.bosses[0], 1)).toBe(Math.floor(50000 * 1.45));
    });
    it('loop 5 es mayor que loop 0', () => {
        gameState.loopCount = 5;
        expect(getBossHP(CONFIG.bosses[0], 5)).toBeGreaterThan(50000);
    });
});

describe('getPrestigeCost', () => {
    it('devuelve tier1 en prestige 0', () => {
        prestigeState.prestigeCount = 0;
        const [shards, essence] = getPrestigeCost();
        expect(shards).toBe(800);
        expect(essence).toBe(5000);
    });
    it('devuelve tier2 en prestige 1', () => {
        prestigeState.prestigeCount = 1;
        const [shards, essence] = getPrestigeCost();
        expect(shards).toBe(2500);
        expect(essence).toBe(50000);
    });
    it('devuelve tier3 en prestige 3 o más', () => {
        prestigeState.prestigeCount = 3;
        const [shards, essence] = getPrestigeCost();
        expect(shards).toBe(8000);
        expect(essence).toBe(500000);
    });
});

describe('canPrestige', () => {
    it('false sin recursos', () => {
        gameState.essence = 0;
        gameState.shards = 0;
        prestigeState.prestigeCount = 0;
        expect(canPrestige()).toBeFalsy();
    });
    it('false con solo essence suficiente', () => {
        gameState.essence = 5000;
        gameState.shards = 0;
        prestigeState.prestigeCount = 0;
        expect(canPrestige()).toBeFalsy();
    });
    it('false con solo shards suficientes', () => {
        gameState.essence = 0;
        gameState.shards = 800;
        prestigeState.prestigeCount = 0;
        expect(canPrestige()).toBeFalsy();
    });
    it('true con recursos exactos tier1', () => {
        gameState.essence = 5000;
        gameState.shards = 800;
        prestigeState.prestigeCount = 0;
        expect(canPrestige()).toBeTruthy();
    });
    it('el coste sube en tier2 respecto a tier1', () => {
        const tier1 = CONFIG.prestigeCost.tier1;
        const tier2 = CONFIG.prestigeCost.tier2;
        expect(tier2.essenceCost).toBeGreaterThan(tier1.essenceCost);
        expect(tier2.shardCost).toBeGreaterThan(tier1.shardCost);
    });
});

describe('computeDPS — cap 85%', () => {
    it('devuelve 0 sin niveles de DPS', () => {
        gameState.upgradesOwned = { 1:10, 2:0, 3:0, 4:0 };
        gameState.dpsLevels = { 101:0, 201:0, 301:0, 401:0 };
        updateCachedDPS();
        expect(cachedDPS).toBe(0);
    });
    it('nunca supera el 85% del daño manual', () => {
        gameState.upgradesOwned = { 1:50, 2:20, 3:10, 4:5 };
        gameState.dpsLevels = { 101:5, 201:5, 301:5, 401:5 };
        updateCachedDPS();
        const manualDmg = calculateManualDamage();
        expect(cachedDPS).toBeLessThanOrEqual(manualDmg * 0.85);
    });
});

describe('handlePrestigeNodePurchase', () => {
    const node = CONFIG.prestigeNodes.find(n => n.id === 101);

    it('no compra si el tier no está disponible', () => {
        prestigeState.unlockedNodes[101] = 0;
        prestigeState.prestigeCount = 0; // tier no disponible
        gameState.shards = 9999;
        const shardsAntes = gameState.shards;
        handlePrestigeNodePurchase(101);
        expect(gameState.shards).toBe(shardsAntes); // shards no cambian
    });

    it('no compra si ya está desbloqueado', () => {
        prestigeState.unlockedNodes[101] = 1; // ya comprado
        prestigeState.prestigeCount = 1;
        gameState.shards = 9999;
        const shardsAntes = gameState.shards;
        handlePrestigeNodePurchase(101);
        expect(gameState.shards).toBe(shardsAntes);
    });

    it('no compra sin shards suficientes', () => {
        prestigeState.unlockedNodes[101] = 0;
        prestigeState.prestigeCount = 1;
        gameState.shards = 10; // menos que node.cost
        handlePrestigeNodePurchase(101);
        expect(prestigeState.unlockedNodes[101]).toBe(0); // sigue sin comprar
    });

    it('compra correctamente con todo en orden', () => {
        prestigeState.unlockedNodes[101] = 0;
        prestigeState.prestigeCount = 1;
        gameState.shards = 9999;
        handlePrestigeNodePurchase(101);
        expect(prestigeState.unlockedNodes[101]).toBe(1); // desbloqueado
        expect(gameState.shards).toBe(9999 - node.cost); // shards descontados
    });
});

describe('getPrestigeMultipliers — sin nodos', () => {
    it('essenceRatio base sin nodos', () => {
        prestigeState.unlockedNodes = Object.fromEntries(CONFIG.prestigeNodes.map(n => [n.id, 0]));
        const mult = getPrestigeMultipliers();
        expect(mult.essenceRatio).toBe(CONFIG.essenceRatio);
    });
    it('trialCost base sin nodos', () => {
        const mult = getPrestigeMultipliers();
        expect(mult.trialCost).toBe(CONFIG.trialMode.costInShards);
    });
    it('manualDamageMult es 1 sin nodos', () => {
        const mult = getPrestigeMultipliers();
        expect(mult.manualDamageMult).toBe(1.0);
    });
});

describe('getPrestigeMultipliers — con nodos activos', () => {
    it('nodo 101 aumenta essenceRatio un 10%', () => {
        prestigeState.unlockedNodes[101] = 1;
        const mult = getPrestigeMultipliers();
        expect(mult.essenceRatio).toBe(CONFIG.essenceRatio * 1.10);
        prestigeState.unlockedNodes[101] = 0;
    });
    it('nodo 102 reduce trialCost un 5%', () => {
        prestigeState.unlockedNodes[102] = 1;
        const mult = getPrestigeMultipliers();
        expect(mult.trialCost).toBe(Math.floor(CONFIG.trialMode.costInShards * 0.95));
        prestigeState.unlockedNodes[102] = 0;
    });
    it('nodo 201 aumenta manualDamageMult a 1.15', () => {
        prestigeState.unlockedNodes[201] = 1;
        const mult = getPrestigeMultipliers();
        expect(mult.manualDamageMult).toBe(1.15);
        prestigeState.unlockedNodes[201] = 0;
    });
    it('nodo 201 aplicado en calculateManualDamage', () => {
        gameState.upgradesOwned = { 1:10, 2:0, 3:0, 4:0 };
        prestigeState.unlockedNodes[201] = 1;
        const conNodo = calculateManualDamage();
        prestigeState.unlockedNodes[201] = 0;
        const sinNodo = calculateManualDamage();
        expect(conNodo).toBe(Math.floor(sinNodo * 1.15));
        prestigeState.unlockedNodes[201] = 0;
    });
    it('nodo 104 reduce scalingPerLoop', () => {
        prestigeState.unlockedNodes[104] = 1;
        const mult = getPrestigeMultipliers();
        expect(mult.scalingPerLoop).toBe(CONFIG.scalingPerLoop * 0.95);
        prestigeState.unlockedNodes[104] = 0;
    });
    it('nodo 104 aplicado en getBossHP', () => {
        gameState.loopCount = 3;
        prestigeState.unlockedNodes[104] = 1;
        const conNodo = getBossHP(CONFIG.bosses[0]);
        prestigeState.unlockedNodes[104] = 0;
        const sinNodo = getBossHP(CONFIG.bosses[0]);
        expect(conNodo).toBeLessThanOrEqual(sinNodo);
        gameState.loopCount = 0;
    });
});

// ── Resumen ─────────────────────────────────────────────
document.getElementById('summary').innerHTML = `
    Total: ${passed + failed} tests —
    <span style="color:#00ff88">✅ ${passed} pasados</span> —
    <span style="color:#ff2d55">❌ ${failed} fallados</span>
`;
</script>
</body>
</html>
